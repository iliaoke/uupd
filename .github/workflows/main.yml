name: windows

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Unzip and run
      run: |
        $zip = Get-ChildItem -Filter *.zip | Select-Object -First 1
        Write-Host "Found zip: $($zip.Name)"
        Expand-Archive -Path $zip.FullName -DestinationPath .
        .\uup_download_windows.cmd
      shell: pwsh

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@main
      with:
        path: |
          **/*.ISO
          **/*.iso
